<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="木製工芸とクラフト作業の仮画像">
  <defs>
    <linearGradient id="wood" x1="0" x2="1">
      <stop offset="0" stop-color="#8a5a32"/>
      <stop offset="0.45" stop-color="#c88d4f"/>
      <stop offset="1" stop-color="#f0c37e"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.018 0.09" numOctaves="4" seed="12"/>
      <feColorMatrix type="saturate" values="0.35"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f7ecd8"/>
  <rect width="1600" height="1000" fill="url(#wood)" filter="url(#grain)" opacity="0.95"/>
  <circle cx="1260" cy="210" r="180" fill="#f6b62d" opacity="0.26"/>
